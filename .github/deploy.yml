name: Deploy ML API to GCP Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/iris-api \
            ./api

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy iris-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/iris-api \
            --platform managed \
            --region asia-south1 \
            --allow-unauthenticated \
            --set-env-vars BUCKET_NAME=${{ secrets.BUCKET_NAME }}

      - name: Show deployed URL
        run: |
          gcloud run services describe iris-api \
            --region asia-south1 \
            --format 'value(status.url)'
