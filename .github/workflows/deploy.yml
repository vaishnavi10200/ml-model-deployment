name: Deploy ML API to GCP Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/iris-api \
            --timeout=600 \
            --async \
            ./api

          echo "Build submitted. Waiting for image to be ready..."
          sleep 90

      - name: Verify image exists
        run: |
          echo "Checking if image was built successfully..."
          for i in 1 2 3 4 5; do
            if gcloud container images describe gcr.io/${{ secrets.GCP_PROJECT_ID }}/iris-api:latest --format='value(image_summary.digest)' 2>/dev/null; then
              echo "Image found!"
              break
            else
              echo "Attempt $i: Image not ready yet, waiting 30s..."
              sleep 30
            fi
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy iris-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/iris-api \
            --platform managed \
            --region asia-south1 \
            --allow-unauthenticated \
            --memory 512Mi \
            --timeout 300 \
            --set-env-vars BUCKET_NAME=${{ secrets.BUCKET_NAME }}

      - name: Show deployed URL
        run: |
          echo "Your live API URL:"
          gcloud run services describe iris-api \
            --region asia-south1 \
            --format 'value(status.url)'

      - name: Deploy frontend to GCP Cloud Storage
        run: |
          gsutil cp frontend/index.html gs://iris-frontend-vaishnavi-488407/
          gsutil cp frontend/style.css gs://iris-frontend-vaishnavi-488407/
          gsutil cp frontend/script.js gs://iris-frontend-vaishnavi-488407/
          gsutil setmeta -h "Content-Type:text/html" gs://iris-frontend-vaishnavi-488407/index.html
          gsutil setmeta -h "Content-Type:text/css" gs://iris-frontend-vaishnavi-488407/style.css
          gsutil setmeta -h "Content-Type:application/javascript" gs://iris-frontend-vaishnavi-488407/script.js
          echo "Frontend live at:"
          echo "https://storage.googleapis.com/iris-frontend-vaishnavi-488407/index.html"
